<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quon Playground</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --fg: #191a1c;
        --muted: #64676f;
        --line: #cfd2d7;
        --panel: #ffffff;
        --accent: #216d63;
        --danger: #a23b3b;
        --code: #101317;
        --code-fg: #eff2f4;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #17191b;
          --fg: #f2f2ed;
          --muted: #a5a8ad;
          --line: #3b3f45;
          --panel: #202326;
          --accent: #58b7a6;
          --danger: #e07676;
          --code: #0f1114;
          --code-fg: #eef0f2;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0 14px 0 0;
        font-size: 18px;
        font-weight: 700;
      }

      label {
        display: grid;
        gap: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
      }

      label.checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 34px;
        color: var(--fg);
        font-size: 13px;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }

      select,
      button {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--fg);
        font: inherit;
      }

      select {
        min-width: 170px;
        padding: 0 30px 0 10px;
      }

      button {
        padding: 0 13px;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-width: 160px;
        color: var(--muted);
        font-size: 13px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(260px, 1fr);
        min-height: 0;
      }

      .pane {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        min-height: 0;
        border-right: 1px solid var(--line);
      }

      .pane:last-child {
        border-right: 0;
      }

      .pane header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 42px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        font-size: 13px;
      }

      textarea,
      pre {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        resize: none;
        outline: none;
        background: var(--code);
        color: var(--code-fg);
        font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0;
        tab-size: 2;
      }

      textarea {
        padding: 14px;
      }

      pre {
        overflow: auto;
        padding: 14px;
        white-space: pre;
      }

      .output-stack {
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(120px, 0.32fr);
        min-height: 0;
      }

      .run-output {
        border-top: 1px solid var(--line);
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(320px, 1fr) minmax(320px, 1fr);
        }

        .pane {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="toolbar">
        <h1>Quon</h1>
        <label>
          Example
          <select id="exampleSelect"></select>
        </label>
        <label>
          Target
          <select id="targetSelect">
            <option value="node2" data-flags="--node2">Node.js</option>
            <option value="ansi3" data-flags="--ansi3">ANSI C</option>
            <option value="ansi3-release" data-flags="--release --ansi3">ANSI C release</option>
            <option value="perl" data-flags="--perl">Perl</option>
            <option value="java" data-flags="--java">Java</option>
            <option value="haskell" data-flags="--haskell">Haskell</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="supportLibrariesToggle" type="checkbox">
          Support libraries
        </label>
        <button id="compileButton" class="primary" type="button">Compile</button>
        <button id="runButton" type="button">Run JS</button>
        <span id="status" class="status">Loading</span>
      </div>

      <section class="workspace">
        <div class="pane">
          <header>
            <strong>Source</strong>
            <span id="sourceName"></span>
          </header>
          <textarea id="sourceEditor" spellcheck="false"></textarea>
        </div>
        <div class="pane">
          <header>
            <strong>Output</strong>
            <span id="outputName"></span>
          </header>
          <div class="output-stack">
            <pre id="compiledOutput"></pre>
            <pre id="runOutput" class="run-output"></pre>
          </div>
        </div>
      </section>
    </main>

    <script src="../bootstrap/quon.js"></script>
    <script src="source-bundle.js"></script>
    <script src="playground.js"></script>
  </body>
</html>
